[alembic]
# Путь к папке с миграциями
script_location = alembic

# Шаблон имени файлов миграций (год_месяц_день_час_мин-хеш_описание.py)
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Мы не указываем sqlalchemy.url здесь, так как он берется из src.core.config
# sqlalchemy.url = driver://user:pass@localhost/dbname

# Максимальная длина описания (slug)
truncate_slug_length = 40

# Использовать системные пути для поиска модулей
prepend_sys_path = .

# Кодировка
output_encoding = utf-8

# Настройки логирования
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S