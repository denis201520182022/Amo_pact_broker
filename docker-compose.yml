version: '3.8'

services:
  # База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: ai_broker_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ai_broker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis для очередей и дебоунса
  redis:
    image: redis:7-alpine
    container_name: ai_broker_redis
    restart: always
    # ports:
    #   - "6379:6379"

  # FastAPI сервер
  api:
    build: .
    container_name: ai_broker_api
    restart: always
    # Пробрасываем 8020 (как настроено в Пакте) на 8000 внутри контейнера
    ports:
      - "8020:8000"
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # Воркер TaskIQ - логика обработки
  worker:
    build: .
    container_name: ai_broker_worker
    restart: always
    command: taskiq worker src.worker:broker --ack-type on_success
    volumes:
      - .:/app
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # Telegram Bot процесс
  tg_bot:
    build: .
    container_name: ai_broker_tg
    restart: always
    command: python src/tg_worker.py
    volumes:
      - .:/app
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_started

  # Планировщик TaskIQ - для отложенных задач (наши 10 сек)
  scheduler:
    build: .
    container_name: ai_broker_scheduler
    restart: always
    command: taskiq scheduler src.worker:broker
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_started

volumes:
  postgres_data: